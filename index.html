<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公式LINE 友だち登録</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background-color: #f5f5f5; margin: 0; padding: 20px; color: #333; }
    .container { max-width: 400px; margin: 0 auto; background: #fff; padding: 30px 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .profile-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; }
    .btn { display: block; background-color: #06C755; color: #fff; text-decoration: none; padding: 15px; border-radius: 30px; font-weight: bold; font-size: 18px; margin: 20px 0; }
    .btn:hover { background-color: #05b34c; }
    .qr-code { width: 200px; height: 200px; margin: 15px 0; }
    .id-box { background: #f0f0f0; padding: 10px; border-radius: 8px; font-size: 18px; font-weight: bold; letter-spacing: 1px; }
    h2 { font-size: 20px; margin-bottom: 5px; }
    p { font-size: 14px; color: #666; margin-bottom: 25px; line-height: 1.6; }
    hr { border: none; border-top: 1px solid #eee; margin: 30px 0; }
  </style>
</head>
<body>
  <div class="container">
    <img src="S__2998301.jpg" alt="プロフィール写真" class="profile-img">
    
    <h2>公式LINEに登録する</h2>
    <p>こんにちは！皆さんとお話しするのを楽しみにしています😊</p>
    
    <a href="https://lin.ee/y81MnEf" class="btn">友だち追加する →</a>
    
    <hr>
    
    <h3>📱 LINE ID で検索</h3>
    <p>LINEアプリの検索から追加できます</p>
    <div class="id-box">@@372kwwhn</div>
    
    <hr>
    
    <h3>📷 QRコードを読み取る</h3>
    <p>LINEアプリの友だち追加画面から<br>QRコードをスキャンしてください</p>
    <img src="qr-code.jpg" alt="LINE QRコード" class="qr-code">
  </div>
</body>
</html>
